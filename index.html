<!doctype html>

<html lang="de">

<head>

  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Income Compass</title>

</head>

<body>

  <h1>Income Compass</h1>

  <p>Depotdaten werden aus data.js geladen.</p>

  <h2 id="depotwert">Lade Depotwert...</h2>

  <h2 id="dividende">Lade Dividende...</h2>

  <script src="data.js"></script>

  <script>

    const depotwert = portfolio.reduce((sum, p) => sum + p.value, 0);

    const dividende = portfolio.reduce((sum, p) => sum + p.dividend, 0);

    document.getElementById("depotwert").textContent =

      "Depotwert: " + depotwert.toLocaleString("de-DE", { style: "currency", currency: "EUR" });

    document.getElementById("dividende").textContent =

      "Jahresdividende: " + dividende.toLocaleString("de-DE", { style: "currency", currency: "EUR" });

  </script>

</body>

</html>
